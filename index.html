<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KAASHI — We'll Be Back Soon!</title>
    <meta name="description" content="KAASHI is temporarily closed. We'll be back on 21st April 2025!">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&family=Cormorant+Garamond:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --dark-brown: #301A0A;
            --rich-brown: #653314;
            --warm-brown: #744924;
            --burnt-orange: #915122;
            --copper: #A3643C;
            --gold: #D19D4C;
            --cream: #CCA584;
            --light-cream: #F5E6D3;
        }

        body {
            font-family: 'Cormorant Garamond', Georgia, serif;
            background: var(--dark-brown);
            color: var(--light-cream);
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Hero Section */
        .hero {
            flex: 1;
            background: linear-gradient(180deg, var(--dark-brown) 0%, var(--rich-brown) 50%, var(--dark-brown) 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 2rem;
            position: relative;
        }

        /* Decorative border */
        .hero::before {
            content: '';
            position: absolute;
            top: 20px;
            left: 20px;
            right: 20px;
            bottom: 20px;
            border: 2px solid var(--gold);
            border-radius: 8px;
            pointer-events: none;
            opacity: 0.5;
        }

        .hero-content {
            position: relative;
            z-index: 1;
            max-width: 500px;
        }

        /* Decorative element */
        .decorative-line {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }

        .decorative-line::before,
        .decorative-line::after {
            content: '';
            width: 60px;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--gold), transparent);
        }

        .decorative-line span {
            color: var(--gold);
            font-size: 1.5rem;
        }

        .logo {
            font-family: 'Cinzel', serif;
            font-size: 4.5rem;
            font-weight: 700;
            color: var(--gold);
            text-shadow: 2px 2px 8px rgba(0,0,0,0.5);
            letter-spacing: 0.3em;
            margin-bottom: 0.25rem;
        }

        .tagline {
            font-size: 1.3rem;
            color: var(--cream);
            font-weight: 400;
            letter-spacing: 0.15em;
            font-style: italic;
        }

        /* Closed Notice */
        .closed-notice {
            margin: 2.5rem 0;
            padding: 2rem;
            background: rgba(0,0,0,0.3);
            border-radius: 12px;
            border: 1px solid var(--gold);
        }

        .closed-icon {
            font-size: 4rem;
            margin-bottom: 1rem;
        }

        .closed-title {
            font-family: 'Cinzel', serif;
            font-size: 1.8rem;
            color: var(--gold);
            letter-spacing: 0.1em;
            margin-bottom: 1rem;
        }

        .closed-message {
            font-size: 1.2rem;
            color: var(--cream);
            margin-bottom: 1.5rem;
            line-height: 1.8;
        }

        .reopen-date {
            display: inline-block;
            background: linear-gradient(135deg, var(--burnt-orange), var(--rich-brown));
            padding: 1rem 2rem;
            border-radius: 8px;
            border: 2px solid var(--gold);
        }

        .reopen-label {
            font-size: 0.9rem;
            color: var(--cream);
            letter-spacing: 0.2em;
            margin-bottom: 0.5rem;
        }

        .reopen-value {
            font-family: 'Cinzel', serif;
            font-size: 1.8rem;
            color: var(--gold);
            font-weight: 700;
        }

        /* Social Link */
        .social-link {
            margin-top: 2rem;
            padding: 1rem;
            background: rgba(0,0,0,0.2);
            border-radius: 8px;
        }

        .social-link p {
            font-size: 1rem;
            color: var(--cream);
            margin-bottom: 0.5rem;
        }

        .social-link a {
            color: var(--gold);
            text-decoration: none;
            font-size: 1.2rem;
            font-weight: 600;
            transition: opacity 0.3s;
        }

        .social-link a:hover {
            opacity: 0.8;
        }

        /* Footer */
        footer {
            text-align: center;
            padding: 1.5rem;
            color: var(--cream);
            opacity: 0.7;
            font-size: 0.85rem;
        }

        /* Responsive */
        @media (max-width: 500px) {
            .logo {
                font-size: 3rem;
                letter-spacing: 0.2em;
            }
            .tagline {
                font-size: 1.1rem;
            }
            .closed-title {
                font-size: 1.4rem;
            }
            .reopen-value {
                font-size: 1.4rem;
            }
            .hero::before {
                top: 10px;
                left: 10px;
                right: 10px;
                bottom: 10px;
            }
        }
    </style>
</head>
<body>
    <section class="hero">
        <div class="hero-content">
            <h1 class="logo">KAASHI</h1>
            <p class="tagline">Taste of Banaras in Dublin</p>
            
            <div class="decorative-line"><span>✦</span></div>

            <div class="closed-notice">
                <div class="closed-icon">🏖️</div>
                <h2 class="closed-title">Taking a Short Break</h2>
                <p class="closed-message">
                    We're temporarily closed while we recharge.<br>
                    Thank you for your love and support!
                </p>
                
                <div class="reopen-date">
                    <div class="reopen-label">WE'RE BACK ON</div>
                    <div class="reopen-value">21st April 2025</div>
                </div>
            </div>

            <div class="social-link">
                <p>Follow us for updates:</p>
                <a href="https://instagram.com/kaashi_dublin">📸 @kaashi_dublin</a>
            </div>
        </div>
    </section>

    <footer>
        See you soon! 🙏
    </footer>
</body>
</html>
